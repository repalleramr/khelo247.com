<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticated Game Mirror Tester</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }
        .panel {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea { height: 80px; font-family: monospace; }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }
        button:hover { background: #059669; }
        .output { background: #1f2937; color: #f9fafb; padding: 16px; border-radius: 6px; overflow-x: auto; font-family: monospace; white-space: pre-wrap; }
        .status { margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <h2>🎮 Authenticated Mirror Pipeline Tester</h2>
    
    <div class="panel">
        <div class="field">
            <label>Vercel Live API URL:</label>
            <input type="text" id="apiUrl" value="https://your-project.vercel.app/api/khelo-mirror">
        </div>
        <div class="field">
            <label>User Session Cookie (Paste Cookie Header Value):</label>
            <textarea id="cookieInput" placeholder="e.g., session_id=abc123xyz; token=eyJhbGci..."></textarea>
        </div>
        <button id="runBtn">Fetch Authenticated Data</button>
        <div id="status" class="status"></div>
    </div>

    <h3>Backend JSON Output:</h3>
    <pre id="outputContainer" class="output">Click run to initiate connection...</pre>

    <script>
        document.getElementById('runBtn').addEventListener('click', async () => {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const cookieVal = document.getElementById('cookieInput').value.trim();
            const status = document.getElementById('status');
            const output = document.getElementById('outputContainer');

            status.textContent = "⏳ Communicating with Vercel Pipeline...";
            status.style.color = "#3b82f6";
            output.textContent = "Connecting...";

            try {
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-session-cookie': cookieVal
                    }
                });

                const data = await response.json();
                output.textContent = JSON.stringify(data, null, 2);

                if (data.success) {
                    status.textContent = "✅ Extraction Completed Successfully!";
                    status.style.color = "#10b981";
                } else {
                    status.textContent = `❌ Backend Error: ${data.error}`;
                    status.style.color = "#ef4444";
                }
            } catch (err) {
                status.textContent = "❌ Network Execution Failed.";
                status.style.color = "#ef4444";
                output.textContent = err.message;
            }
        });
    </script>
</body>
</html>
