<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khelo Mirror - Live Evaluation</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-dark: #0a0a0c;
            --bg-surface: #1a1b20;
            --bg-card: #24252b;
            --primary-gold: #ffc700;
            --text-main: #ffffff;
            --text-muted: #8b8c91;
            --balance-green: #00e701;
            --evo-color: #facc15;
            --ezugi-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-bottom: 70px; /* Space for bottom nav */
        }

        /* Top Header */
        .app-header {
            background-color: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2a2b30;
        }

        .brand {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .brand span {
            color: var(--primary-gold);
        }

        /* Wallet Section */
        .wallet-pill {
            background-color: #121316;
            border: 1px solid #33343a;
            border-radius: 20px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wallet-icon {
            font-size: 14px;
        }

        .balance-text {
            color: var(--balance-green);
            font-weight: 700;
            font-size: 15px;
        }

        /* Horizontal Scroll Categories */
        .category-scroll {
            display: flex;
            overflow-x: auto;
            padding: 12px 16px;
            gap: 10px;
            background-color: var(--bg-dark);
            /* Hide scrollbar */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            background-color: var(--bg-surface);
            color: var(--text-muted);
            border: 1px solid #2a2b30;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cat-btn.active {
            background-color: var(--primary-gold);
            color: #000;
            border-color: var(--primary-gold);
        }

        /* Game Grid */
        .game-container {
            padding: 10px 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns for mobile app feel */
            gap: 12px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #2a2b30;
        }

        .card-image {
            height: 120px;
            background: linear-gradient(180deg, #2a2b30 0%, #1a1b20 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .card-details {
            padding: 10px;
            background-color: var(--bg-surface);
        }

        .game-title {
            font-size: 13px;
            font-weight: 600;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .provider-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .evo-text { color: var(--evo-color); }
        .ezugi-text { color: var(--ezugi-color); }

        /* Loading State */
        .loader {
            text-align: center;
            padding: 40px 20px;
            color: var(--primary-gold);
            font-size: 14px;
            font-weight: 600;
        }

        /* Bottom App Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: var(--bg-surface);
            border-top: 1px solid #2a2b30;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
        }
        
        .nav-item.active {
            color: var(--primary-gold);
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="brand">Khelo<span>247</span></div>
        <div class="wallet-pill">
            <span class="wallet-icon">💰</span>
            <span class="balance-text" id="balance-display">₹0.00</span>
        </div>
    </header>

    <div class="category-scroll">
        <div class="cat-btn active" onclick="filterGames('All', this)">Live Casino</div>
        <div class="cat-btn" onclick="filterGames('Evolution', this)">Evolution</div>
        <div class="cat-btn" onclick="filterGames('Ezugi', this)">Ezugi</div>
    </div>

    <div class="game-container">
        <div id="loading" class="loader">Loading Live Tables...</div>
        <div class="grid" id="games-grid"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </div>
        <div class="nav-item active">
            <span class="nav-icon">🎰</span>
            <span>Casino</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">📄</span>
            <span>Bets</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </div>
    </div>

    <script>
        const API_URL = 'https://khelo247-com.vercel.app/api/live-casino-mirror';
        let allGames = []; // Store games globally so we can filter them

        async function init() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                document.getElementById('loading').style.display = 'none';

                if (result.success) {
                    // 1. Set Balance
                    document.getElementById('balance-display').innerText = `₹${result.data.balance}`;
                    
                    // 2. Save games to memory for the filter buttons
                    allGames = result.data.liveGames;
                    
                    // 3. Render all games initially
                    renderGames(allGames);
                }
            } catch (err) {
                document.getElementById('loading').innerText = 'Connection Error. Please refresh.';
            }
        }

        function renderGames(gamesToRender) {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = ''; // Clear current grid
            
            if(gamesToRender.length === 0) {
                grid.innerHTML = '<div style="color: white; padding: 20px; grid-column: span 2; text-align: center;">No games found for this provider.</div>';
                return;
            }

            gamesToRender.forEach((game, index) => {
                // Emulate game thumbnails
                const emojis = ['🙎‍♀️', '🃏', '🎲', '🎡'];
                const icon = emojis[index % emojis.length];
                
                const isEvo = game.provider === 'Evolution';
                const providerClass = isEvo ? 'evo-text' : 'ezugi-text';
                
                const card = `
                    <div class="card">
                        <div class="card-image">${icon}</div>
                        <div class="card-details">
                            <h3 class="game-title">${game.title}</h3>
                            <span class="provider-badge ${providerClass}">${game.provider}</span>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // Logic for the Filter Buttons
        window.filterGames = function(provider, buttonElement) {
            // Update active button styling
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            // Filter the array
            if (provider === 'All') {
                renderGames(allGames);
            } else {
                const filtered = allGames.filter(game => game.provider === provider);
                renderGames(filtered);
            }
        };

        // Start the app
        window.onload = init;
    </script>
</body>
</html>
