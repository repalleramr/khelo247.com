<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khelo Mirror - Live Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gold: #fbbf24;
            --accent-green: #10b981;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar */
        header {
            background-color: #0b1120;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent-gold);
            letter-spacing: 1px;
        }

        /* Main Container */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Wallet Card */
        .wallet-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .wallet-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .wallet-balance {
            font-size: 36px;
            font-weight: 800;
            color: var(--accent-green);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wallet-balance::before {
            content: '₹';
            color: var(--text-muted);
            font-size: 28px;
        }

        /* Games Section */
        .section-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }

        .game-card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .game-card:active {
            transform: scale(0.96);
        }

        .game-thumb {
            height: 100px;
            background-color: #26334a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .game-info {
            padding: 12px;
        }

        .game-title {
            font-size: 13px;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        /* Loading State */
        .loader {
            text-align: center;
            padding: 50px;
            color: var(--accent-gold);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KHELO MIRROR</div>
        <div style="font-size: 24px;">⚙️</div>
    </header>

    <div class="container">
        <div class="wallet-card">
            <div class="wallet-label">Extracted Balance</div>
            <h2 class="wallet-balance" id="ui-balance">0.00</h2>
        </div>

        <div class="section-header">🎰 Available Games</div>
        
        <div id="loading-state" class="loader">
            Fetching live data from backend...
        </div>

        <div class="games-grid" id="ui-games-grid">
            </div>
    </div>

    <script>
        // 1. Point to your live Vercel API backend
        const API_URL = 'https://khelo247-com.vercel.app/api/live-casino-mirror';

        async function fetchDashboardData() {
            try {
                // 2. Call the API
                const response = await fetch(API_URL);
                const result = await response.json();

                // 3. Remove the loading message
                document.getElementById('loading-state').style.display = 'none';

                if (result.success) {
                    // 4. Update the Balance UI
                    document.getElementById('ui-balance').innerText = result.data.balance;

                    // 5. Update the Games Grid UI
                    const gridContainer = document.getElementById('ui-games-grid');
                    gridContainer.innerHTML = ''; // Clear empty grid

                    // Loop through the games array and create a card for each one
                    result.data.liveGames.forEach((game, index) => {
                        // Alternate some emojis just to make the UI look dynamic
                        const emojis = ['🃏', '🎲', '🎰', '💎', '👑'];
                        const randomEmoji = emojis[index % emojis.length];

                        // Build the HTML for the card
                        const cardHTML = `
                            <div class="game-card">
                                <div class="game-thumb">${randomEmoji}</div>
                                <div class="game-info">
                                    <h3 class="game-title">${game.title}</h3>
                                </div>
                            </div>
                        `;
                        // Inject into the page
                        gridContainer.innerHTML += cardHTML;
                    });
                } else {
                    alert('Backend returned an error: ' + result.error);
                }

            } catch (error) {
                document.getElementById('loading-state').innerText = 'Network Error. Could not connect to backend.';
                console.error('Fetch error:', error);
            }
        }

        // 6. Trigger the fetch as soon as the page loads
        window.onload = fetchDashboardData;
    </script>
</body>
</html>
