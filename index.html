<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khelo Mirror - Live Evaluation</title>
    <style>
        :root {
            --bg-main: #121418;
            --card-bg: #1e2229;
            --text-light: #ffffff;
            --text-dim: #9ca3af;
            --evo-color: #facc15; /* Evolution Gold */
            --ezugi-color: #ef4444; /* Ezugi Red */
            --balance-green: #22c55e;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            padding-bottom: 40px;
        }

        /* Top Navigation */
        .navbar {
            background-color: #0b0c0f;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2e37;
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-light);
        }

        .brand span { color: var(--evo-color); }

        /* Container & Wallet */
        .container {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .wallet {
            background: linear-gradient(135deg, #1f2937, #111827);
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .wallet-title {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .wallet-amount {
            font-size: 32px;
            font-weight: 800;
            color: var(--balance-green);
            margin: 0;
        }

        /* Filter Tabs */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            background-color: #374151;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .filter-btn.active {
            background-color: var(--evo-color);
            color: #000;
        }

        /* Game Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #374151;
        }

        .card-image {
            height: 110px;
            background-color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .card-details {
            padding: 12px;
            position: relative;
        }

        .game-title {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Dynamic Provider Badges */
        .provider-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 3px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .badge-evolution {
            background-color: rgba(250, 204, 21, 0.2);
            color: var(--evo-color);
        }

        .badge-ezugi {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--ezugi-color);
        }

        .status {
            text-align: center;
            color: var(--evo-color);
            padding: 40px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand">KHELO<span>MIRROR</span></div>
        <div style="color: white;">⚙️</div>
    </nav>

    <div class="container">
        <div class="wallet">
            <div class="wallet-title">User Balance</div>
            <div class="wallet-amount" id="balance-display">₹0.00</div>
        </div>

        <div class="filters">
            <button class="filter-btn active">Live Casino</button>
            <button class="filter-btn">Evolution</button>
            <button class="filter-btn">Ezugi</button>
        </div>
        
        <div id="loading" class="status">Connecting to Evaluation Backend...</div>
        <div class="grid" id="games-grid"></div>
    </div>

    <script>
        const API_URL = 'https://khelo247-com.vercel.app/api/live-casino-mirror';

        async function init() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                document.getElementById('loading').style.display = 'none';

                if (result.success) {
                    // Update Balance
                    document.getElementById('balance-display').innerText = `₹${result.data.balance}`;

                    // Populate Games
                    const grid = document.getElementById('games-grid');
                    
                    result.data.liveGames.forEach((game, index) => {
                        const emojis = ['🎰', '🃏', '🎲', '👑'];
                        const icon = emojis[index % emojis.length];
                        
                        // Determine badge color based on provider
                        const badgeClass = game.provider === 'Evolution' ? 'badge-evolution' : 'badge-ezugi';

                        const card = `
                            <div class="card">
                                <div class="card-image">${icon}</div>
                                <div class="card-details">
                                    <h3 class="game-title">${game.title}</h3>
                                    <span class="provider-badge ${badgeClass}">${game.provider}</span>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                }
            } catch (err) {
                document.getElementById('loading').innerText = 'Connection Failed';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
