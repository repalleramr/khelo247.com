<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khelo24bet | Live Fun Arena for Online Challenges</title>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-surface: #111111;
            --bg-card: #222222;
            --primary-gold: #f9bb22;
            --accent-gold-gradient: linear-gradient(180deg, #F0D670 0%, #BB891A 70.86%);
            --text-main: #ffffff;
            --text-muted: #8f99a3;
            --balance-green: #22c55e;
            --evo-color: #facc15;
            --ezugi-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: "Roboto", -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        /* Core Navbar Styles from Template */
        .mobile_header_rj {
            background: #111111;
            border-bottom: 1px solid #2a2e37;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .rj_header_top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            height: 60px;
        }

        .rj_logo_sec {
            height: 35px;
            display: flex;
            align-items: center;
        }

        .rj_logo_sec img {
            height: 100%;
            width: auto;
        }

        .rj_header_middle_sec {
            display: flex;
            background: #1a1a1a;
            border-top: 1px solid #2a2e37;
            padding: 6px 16px;
            justify-content: space-between;
            align-items: center;
        }

        .rj_coin_sec {
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: right;
        }

        .rj_coin_sec p {
            margin: 0;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            line-height: 1.2;
        }

        .rj_coin_sec span {
            display: block;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
        }

        /* Search Layout Frame */
        .menu_and_search {
            padding: 12px 16px;
            background-color: var(--bg-dark);
        }

        .gameSearch-input {
            width: 100%;
            position: relative;
        }

        .gameSearch-input input {
            width: 100%;
            background-color: #2b2b2b;
            border: 1px solid #3b3b3b;
            border-radius: 6px;
            padding: 10px 12px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        /* Horizontal Category Ribbon Scroll */
        .scroll_main {
            background-color: #111111;
            border-bottom: 1px solid #2a2e37;
        }

        .navbar-scroll {
            display: flex;
            overflow-x: auto;
            margin: 0;
            padding: 0;
            list-style: none;
            scrollbar-width: none;
        }

        .navbar-scroll::-webkit-scrollbar {
            display: none;
        }

        .navtext {
            padding: 14px 18px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            position: relative;
            text-transform: uppercase;
        }

        .navtext.actives {
            color: var(--primary-gold);
        }

        .navtext.actives span {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-gold);
        }

        /* Grid Framework Layout */
        .main_parent_section {
            padding: 16px;
        }

        .outer-head-title h3 {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0 0 16px 0;
            color: #ffffff;
            border-left: 3px solid var(--primary-gold);
            padding-left: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333333;
            display: flex;
            flex-direction: column;
        }

        .card-image {
            height: 105px;
            background: #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .card-details {
            padding: 10px;
            background-color: var(--bg-surface);
        }

        .game-title {
            font-size: 13px;
            font-weight: 600;
            margin: 0 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ffffff;
        }

        .provider-badge {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .badge-evo { background-color: rgba(250, 204, 21, 0.15); color: var(--evo-color); }
        .badge-ezugi { background-color: rgba(239, 68, 68, 0.15); color: var(--ezugi-color); }

        .status {
            text-align: center;
            color: var(--primary-gold);
            padding: 30px;
            font-size: 14px;
        }

        /* Sticky Layout Mobile Footer Bar */
        .mobile_footer_new {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #111111;
            border-top: 1px solid #2a2e37;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 100;
        }

        .footer-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            text-decoration: none;
            gap: 4px;
        }

        .footer-tab.active {
            color: var(--primary-gold);
        }

        .footer-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- Target Top Bar Structure -->
    <header class="mobile_header_rj">
        <div class="rj_header_top">
            <div class="rj_logo_sec">
                <strong style="color: #fff; font-size: 20px; letter-spacing: 0.5px;">KHELO<span style="color: var(--primary-gold)">24BET</span></strong>
            </div>
            <div style="background: var(--accent-gold-gradient); padding: 6px 14px; border-radius: 4px; color: #000; font-weight: bold; font-size: 13px;">
                Deposit
            </div>
        </div>
        <div class="rj_header_middle_sec">
            <div style="font-size: 18px; color: var(--text-muted);">⚙️</div>
            <div class="rj_coin_sec">
                <p>Balance<br><span id="balance-display">0.00</span></p>
            </div>
        </div>
    </header>

    <!-- Search Node -->
    <section class="menu_and_search m12 top_search_visible">
        <div class="gameSearch-input">
            <input type="text" id="game-search-filter" onkeyup="searchQueryFilter()" placeholder="Search Games Here">
        </div>
    </section>

    <!-- Navigation Ribbon Categories -->
    <section class="space_between scroll_main">
        <ul class="navbar-scroll">
            <li class="navtext actives" onclick="switchCategory('All', this)">All Games<span></span></li>
            <li class="navtext" onclick="switchCategory('Evolution', this)">Evolution<span></span></li>
            <li class="navtext" onclick="switchCategory('Ezugi', this)">Ezugi<span></span></li>
        </ul>
    </section>

    <!-- Main Section Structure -->
    <main class="main_parent_section">
        <div class="outer-head-title">
            <h3>🎰 Live Casino Platform</h3>
        </div>
        
        <div id="loading-node" class="status">Parsing Environment Data Container...</div>
        <div class="grid" id="games-grid-container"></div>
    </main>

    <!-- Application Footer Ribbon -->
    <div class="mobile_footer_new">
        <a class="footer-tab">
            <span class="footer-icon">🏏</span>
            <span>Sports</span>
        </a>
        <a class="footer-tab">
            <span class="footer-icon">📈</span>
            <span>Inplay</span>
        </a>
        <a class="footer-tab active">
            <span class="footer-icon">🎰</span>
            <span>Casino</span>
        </a>
        <a class="footer-tab">
            <span class="footer-icon">👤</span>
            <span>Account</span>
        </a>
    </div>

    <script>
        const BACKEND_ENDPOINT = 'https://khelo247-com.vercel.app/api/live-casino-mirror';
        let internalCache = [];

        async function pullStructure() {
            try {
                const response = await fetch(BACKEND_ENDPOINT);
                const payload = await response.json();
                
                document.getElementById('loading-node').style.display = 'none';

                if (payload.success) {
                    document.getElementById('balance-display').innerText = `₹${payload.data.balance}`;
                    internalCache = payload.data.liveGames;
                    renderDataList(internalCache);
                }
            } catch (err) {
                document.getElementById('loading-node').innerText = 'Data connection interrupted.';
            }
        }

        function renderDataList(dataset) {
            const container = document.getElementById('games-grid-container');
            container.innerHTML = '';
            
            if(dataset.length === 0) {
                container.innerHTML = '<div style="color: var(--text-muted); padding: 20px; grid-column: span 2; text-align: center;">No active matching games available.</div>';
                return;
            }

            dataset.forEach((item, index) => {
                const iconArray = ['🎰', '🃏', '🎲', '🎡'];
                const visualNode = iconArray[index % iconArray.length];
                const badgeStyle = item.provider === 'Evolution' ? 'badge-evo' : 'badge-ezugi';
                
                const elementLayout = `
                    <a href="${item.link}" style="text-decoration: none; color: inherit; display: block;">
                        <div class="card">
                            <div class="card-image">${visualNode}</div>
                            <div class="card-details">
                                <h3 class="game-title">${item.title}</h3>
                                <span class="provider-badge ${badgeStyle}">${item.provider}</span>
                            </div>
                        </div>
                    </a>
                `;
                container.innerHTML += elementLayout;
            });
        }

        window.switchCategory = function(targetProvider, element) {
            document.querySelectorAll('.navtext').forEach(node => node.classList.remove('actives'));
            element.classList.add('actives');

            if (targetProvider === 'All') {
                renderDataList(internalCache);
            } else {
                const subset = internalCache.filter(game => game.provider === targetProvider);
                renderDataList(subset);
            }
        };

        window.searchQueryFilter = function() {
            const searchStr = document.getElementById('game-search-filter').value.toLowerCase();
            const matchingNodes = internalCache.filter(game => game.title.toLowerCase().includes(searchStr));
            renderDataList(matchingNodes);
        };

        window.onload = pullStructure;
    </script>
</body>
</html>
